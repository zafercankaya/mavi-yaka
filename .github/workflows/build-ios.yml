name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fix SDK compatibility
        run: cd apps/mobile && npx expo install --fix

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write ASC API Key
        run: |
          echo "${{ secrets.ASC_API_KEY_P8 }}" | base64 -d > apps/mobile/AuthKey_FP7HKC7HG4.p8
          echo "ASC API Key written"

      - name: Build iOS IPA (local)
        run: cd apps/mobile && eas build --platform ios --profile production --local --non-interactive --output ./build.ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_APP_STORE_CONNECT_API_KEY_KEY_ID: FP7HKC7HG4
          EXPO_APPLE_APP_STORE_CONNECT_API_KEY_ISSUER_ID: 47170daa-a9bc-41f4-9653-b6f6859347a6
          EXPO_APPLE_APP_STORE_CONNECT_API_KEY_PATH: ./AuthKey_FP7HKC7HG4.p8

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mavi-yaka-ios
          path: apps/mobile/build.ipa
          retention-days: 30

      - name: Submit to App Store
        run: cd apps/mobile && eas submit --platform ios --profile production --path ./build.ipa --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
