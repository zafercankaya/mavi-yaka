name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fix SDK compatibility
        run: cd apps/mobile && npx expo install --fix

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup iOS signing credentials
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          cd apps/mobile
          echo "$IOS_DIST_CERT_P12_BASE64" | base64 -d > dist_cert.p12
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d > dist_profile.mobileprovision
          echo "{\"ios\":{\"provisioningProfilePath\":\"./dist_profile.mobileprovision\",\"distributionCertificate\":{\"path\":\"./dist_cert.p12\",\"password\":\"$IOS_DIST_CERT_PASSWORD\"}}}" > credentials.json
          echo "Local credentials configured"

      - name: Build iOS IPA (local)
        run: cd apps/mobile && eas build --platform ios --profile production --local --non-interactive --output ./build.ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mavi-yaka-ios
          path: apps/mobile/build.ipa
          retention-days: 30

      - name: Write ASC API Key
        run: echo "${{ secrets.ASC_API_KEY_P8 }}" | base64 -d > apps/mobile/AuthKey_FP7HKC7HG4.p8

      - name: Submit to App Store
        run: cd apps/mobile && eas submit --platform ios --profile production --path ./build.ipa --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
