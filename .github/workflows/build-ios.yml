name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fix SDK compatibility
        run: cd apps/mobile && npx expo install --fix

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS IPA (local)
        run: cd apps/mobile && eas build --platform ios --profile production --local --non-interactive --output ./build.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mavi-yaka-ios
          path: apps/mobile/build.ipa
          retention-days: 30

      - name: Write ASC API Key
        run: echo "${{ secrets.ASC_API_KEY_P8 }}" | base64 -d > apps/mobile/AuthKey_FP7HKC7HG4.p8

      - name: Submit to App Store
        run: cd apps/mobile && eas submit --platform ios --profile production --path ./build.ipa --non-interactive
