name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create google-service-account.json
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > apps/mobile/google-service-account.json

      - name: Build Android AAB (local)
        run: cd apps/mobile && eas build --platform android --profile production --local --non-interactive --output ./build.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: mavi-yaka-android
          path: apps/mobile/build.aab
          retention-days: 30

      - name: Submit to Google Play (internal)
        run: cd apps/mobile && eas submit --platform android --profile production --path ./build.aab --non-interactive
